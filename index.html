<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VELORA IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 50px 24px 30px;
  position: relative;
  overflow: hidden;
}

.neon-bg {
  position: fixed;
  bottom: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 130%;
  height: 400px;
  background: radial-gradient(ellipse, rgba(212,20,189,0.35) 0%, transparent 70%);
  filter: blur(50px);
  pointer-events: none;
  z-index: 0;
}

.content { position: relative; z-index: 1; width: 100%; max-width: 420px; }

/* Header */
.logo { font-size: 56px; font-weight: 900; letter-spacing: -2px; font-style: italic; text-align: center; margin-bottom: 10px; }
.tagline { color: #888; font-size: 16px; text-align: center; line-height: 1.5; margin-bottom: 40px; }

/* Buttons */
.btn-google {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: #fff;
  color: #111;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 16px;
}
.btn-google:hover { background: #f0f0f0; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.1); }
.btn-google:active { transform: scale(0.98); }
.btn-google:disabled { opacity: 0.7; cursor: not-allowed; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 16px;
}
.divider div { flex: 1; height: 1px; background: #1a001a; }
.divider span { color: #444; font-size: 13px; }

.input {
  width: 100%;
  background: #0a000a;
  border: 1.5px solid #1a001a;
  border-radius: 14px;
  padding: 15px 18px;
  color: #fff;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 10px;
  display: block;
}
.input:focus { border-color: #d414bd; }
.input::placeholder { color: #444; }

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, #d414bd, #9b12d4);
  border: none;
  border-radius: 14px;
  padding: 16px;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all .2s;
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,20,189,0.4); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.switch-mode {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
  color: #555;
}
.switch-mode a { color: #d414bd; font-weight: 600; cursor: pointer; text-decoration: none; }
.switch-mode a:hover { color: #ff44dd; }

.error-box {
  background: rgba(220,38,38,0.1);
  border: 1px solid rgba(220,38,38,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: #fca5a5;
  margin-bottom: 12px;
  display: none;
  text-align: center;
}

.success-box {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: #86efac;
  margin-bottom: 12px;
  display: none;
  text-align: center;
}

/* Spinner */
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Loading screen */
#loading-screen {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
#loading-screen.hidden { display: none; }
.loading-logo { font-size: 48px; font-weight: 900; font-style: italic; margin-bottom: 20px; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid rgba(212,20,189,0.2); border-top-color: #d414bd; border-radius: 50%; animation: spin .7s linear infinite; }

/* Footer */
.footer { text-align: center; font-size: 12px; color: #333; line-height: 1.6; position: relative; z-index: 1; }
.footer a { color: #d414bd; text-decoration: none; }

/* Forgot password */
.forgot { text-align: right; font-size: 13px; margin-bottom: 6px; }
.forgot a { color: #d414bd; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">VELORA IA</div>
  <div class="loading-spinner"></div>
</div>

<div class="neon-bg"></div>

<!-- Header -->
<header class="content" style="text-align:center; margin-top: 20px;">
  <div class="logo">VELORA IA</div>
  <p class="tagline">Seja Bem Vindo ao Nosso Modelo<br>De Inteligência Artificial</p>
</header>

<!-- Form -->
<main class="content" id="main-form">

  <!-- Google Button -->
  <button class="btn-google" id="btn-google" onclick="loginGoogle()">
    <svg width="22" height="22" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar com Google
  </button>

  <div class="divider"><div></div><span>ou</span><div></div></div>

  <!-- Error / Success -->
  <div class="error-box" id="error-box"></div>
  <div class="success-box" id="success-box"></div>

  <!-- Email -->
  <input class="input" id="email" type="email" placeholder="E-mail" autocomplete="email"/>

  <!-- Password -->
  <input class="input" id="password" type="password" placeholder="Palavra-passe" autocomplete="current-password" onkeydown="if(event.key==='Enter') submitForm()"/>

  <!-- Confirm Password (só no registo) -->
  <input class="input" id="confirm-password" type="password" placeholder="Confirmar palavra-passe" style="display:none;" onkeydown="if(event.key==='Enter') submitForm()"/>

  <!-- Forgot password (só no login) -->
  <div class="forgot" id="forgot-wrap">
    <a onclick="resetPassword()">Esqueceste a palavra-passe?</a>
  </div>

  <!-- Submit -->
  <button class="btn-primary" id="btn-submit" onclick="submitForm()">
    Acessar
  </button>

  <!-- Switch mode -->
  <div class="switch-mode" id="switch-text">
    Não tens conta? <a onclick="switchToRegister()">Criar conta</a>
  </div>

</main>

<!-- Footer -->
<footer class="footer">
  Ao continuar concordas com os
  <a href="#">Termos de Uso</a> e
  <a href="#">Política de Privacidade</a>
</footer>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAW2ISQ2TKR2p0-QF_v0aADiD-ttDpGm3c",
  authDomain: "velora-ia-e2539.firebaseapp.com",
  projectId: "velora-ia-e2539",
  storageBucket: "velora-ia-e2539.firebasestorage.app",
  messagingSenderId: "876348453170",
  appId: "1:876348453170:web:bcca8ebde23563e26a412b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let isRegisterMode = false;

// Verificar se já está logado
onAuthStateChanged(auth, (user) => {
  if (user) {
    // Guardar dados do utilizador
    localStorage.setItem('velora_user', JSON.stringify({
      uid: user.uid,
      name: user.displayName || user.email.split('@')[0],
      email: user.email,
      avatar: (user.displayName || user.email)[0].toUpperCase(),
      photo: user.photoURL || null
    }));
    window.location.href = 'chat.html';
  } else {
    document.getElementById('loading-screen').classList.add('hidden');
  }
});

// Google Login
window.loginGoogle = async function() {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> A autenticar...';
  hideMessages();

  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged vai redirecionar
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continuar com Google`;
    showError(getErrorMsg(e.code));
  }
};

// Submit (Login ou Registo)
window.submitForm = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;

  hideMessages();

  if (!email) { showError('Insere o teu e-mail'); return; }
  if (!password) { showError('Insere a palavra-passe'); return; }
  if (password.length < 6) { showError('A palavra-passe deve ter mínimo 6 caracteres'); return; }
  if (isRegisterMode && password !== confirm) { showError('As palavras-passe não coincidem'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    if (isRegisterMode) {
      await createUserWithEmailAndPassword(auth, email, password);
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
    // onAuthStateChanged redireciona
  } catch (e) {
    btn.disabled = false;
    btn.textContent = isRegisterMode ? 'Criar Conta' : 'Acessar';
    showError(getErrorMsg(e.code));
  }
};

// Reset Password
window.resetPassword = async function() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Insere o teu e-mail primeiro'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess('E-mail de recuperação enviado! Verifica a tua caixa.');
  } catch (e) {
    showError(getErrorMsg(e.code));
  }
};

// Switch modes
window.switchToRegister = function() {
  isRegisterMode = true;
  document.getElementById('confirm-password').style.display = 'block';
  document.getElementById('forgot-wrap').style.display = 'none';
  document.getElementById('btn-submit').textContent = 'Criar Conta';
  document.getElementById('switch-text').innerHTML = 'Já tens conta? <a onclick="switchToLogin()">Entrar</a>';
  hideMessages();
};

window.switchToLogin = function() {
  isRegisterMode = false;
  document.getElementById('confirm-password').style.display = 'none';
  document.getElementById('forgot-wrap').style.display = 'block';
  document.getElementById('btn-submit').textContent = 'Acessar';
  document.getElementById('switch-text').innerHTML = 'Não tens conta? <a onclick="switchToRegister()">Criar conta</a>';
  hideMessages();
};

// Helpers
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = '✅ ' + msg;
  el.style.display = 'block';
}

function hideMessages() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('success-box').style.display = 'none';
}

function getErrorMsg(code) {
  const msgs = {
    'auth/invalid-email': 'E-mail inválido',
    'auth/user-not-found': 'Conta não encontrada. Cria uma conta primeiro.',
    'auth/wrong-password': 'Palavra-passe incorreta',
    'auth/invalid-credential': 'E-mail ou palavra-passe incorretos',
    'auth/email-already-in-use': 'Este e-mail já está registado. Faz login.',
    'auth/weak-password': 'Palavra-passe muito fraca. Usa mínimo 6 caracteres.',
    'auth/too-many-requests': 'Muitas tentativas. Tenta mais tarde.',
    'auth/popup-closed-by-user': 'Login cancelado.',
    'auth/network-request-failed': 'Sem conexão à internet.',
  };
  return msgs[code] || 'Erro: ' + code;
}
</script>

</body>
</html>
