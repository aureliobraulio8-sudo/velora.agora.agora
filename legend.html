<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VELORA - Legendas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100dvh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: #000; border-bottom: 1px solid #0d000d; position: sticky; top: 0; z-index: 10; }
.glow-btn { border: 1.5px solid #ff00ff; color: #ff00ff; background: transparent; padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
main { padding: 16px; padding-bottom: 130px; max-width: 480px; margin: 0 auto; }
.hero { text-align: center; padding: 30px 20px; position: relative; }
.hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at center, rgba(212,20,189,0.08), transparent 70%); pointer-events:none; }
.type-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.type-btn { background: #0a000a; border: 1px solid #1a001a; border-radius: 12px; padding: 9px 16px; font-size: 13px; color: #888; cursor: pointer; transition: all .15s; }
.type-btn.active { background: rgba(212,20,189,0.12); border-color: #d414bd; color: #ff44dd; }
textarea.prompt { width: 100%; background: #0a000a; border: 1.5px solid #1a001a; border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 14px; outline: none; resize: none; height: 90px; font-family: 'Inter', sans-serif; transition: border-color .2s; }
textarea.prompt:focus { border-color: #ff00aa; }
textarea.prompt::placeholder { color: #444; }
.btn-create { width: 100%; padding: 15px; background: linear-gradient(135deg,#d414bd,#9b12d4); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; margin: 14px 0 8px; }
.btn-create:disabled { opacity: 0.6; cursor: not-allowed; }
.result-box { background: #080008; border: 1px solid #1a001a; border-radius: 14px; padding: 16px; margin: 16px 0; }
.result-label { font-size: 11px; color: #ff00aa; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.result-text { font-size: 15px; line-height: 1.7; color: #ddd; white-space: pre-line; }
.btn-copy { width: 100%; padding: 11px; background: transparent; border: 1px solid #1a001a; border-radius: 12px; color: #888; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 10px; transition: all .15s; }
.btn-copy:hover { border-color: #ff00aa; color: #ff00aa; }
.saved-card { background: #080008; border: 1px solid #1a001a; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.spinner { width: 28px; height: 28px; border: 3px solid rgba(212,20,189,0.2); border-top-color: #d414bd; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px 20px; background: #000; border-top: 1px solid #0d000d; z-index: 10; }
.bottom-input { display: flex; align-items: center; background: #000; border: 2px solid #ff00ff; border-radius: 26px; padding: 6px 8px 6px 16px; box-shadow: 0 0 10px rgba(255,0,255,0.15); gap: 8px; }
.bottom-input input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; }
.bottom-input input::placeholder { color: #444; }
.bottom-input button { width: 36px; height: 36px; background: linear-gradient(135deg,#d414bd,#9b12d4); border: none; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<header>
  <button onclick="window.location.href='chat.html'" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;"><i class="fa-solid fa-arrow-left"></i></button>
  <span style="font-size:17px;font-weight:700;letter-spacing:1px;">LEGENDAS</span>
  <button class="glow-btn" onclick="window.location.href='plus.html'">Plus</button>
</header>

<main>
  <!-- Hero -->
  <div class="hero">
    <div style="font-size:50px;margin-bottom:10px;">📝</div>
    <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">A tua legenda começa aqui</h2>
    <p style="color:#555;font-size:14px;">Descreve o conteúdo e a VELORA cria</p>
  </div>

  <!-- Topic -->
  <textarea class="prompt" id="topic" placeholder="Ex: foto na praia ao pôr do sol, carro de luxo, café da manhã saudável, conquista profissional..."></textarea>

  <!-- Types -->
  <div class="type-grid">
    <button class="type-btn active" data-type="motivacional" onclick="pickType(this)">🔥 Motivacional</button>
    <button class="type-btn" data-type="poesia" onclick="pickType(this)">🌹 Poesia</button>
    <button class="type-btn" data-type="instagram" onclick="pickType(this)">📱 Instagram</button>
    <button class="type-btn" data-type="tiktok" onclick="pickType(this)">⚡ TikTok Hook</button>
    <button class="type-btn" data-type="profissional" onclick="pickType(this)">💼 LinkedIn</button>
    <button class="type-btn" data-type="humor" onclick="pickType(this)">😂 Humor</button>
  </div>

  <button class="btn-create" id="btn-create" onclick="create()">
    <i class="fa-solid fa-wand-magic-sparkles"></i> CRIAR LEGENDA
  </button>

  <!-- Loading -->
  <div id="loading" style="display:none;text-align:center;padding:24px 0;">
    <div class="spinner"></div>
    <p style="color:#555;font-size:13px;margin-top:10px;">A VELORA está a criar...</p>
  </div>

  <!-- Result -->
  <div id="result" style="display:none;">
    <div class="result-box">
      <div class="result-label">✦ Criado pela VELORA IA</div>
      <div class="result-text" id="result-text"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-copy" style="flex:2" id="btn-copy" onclick="copyResult()"><i class="fa-regular fa-copy"></i> Copiar Tudo</button>
      <button class="btn-copy" style="flex:1" onclick="saveResult()"><i class="fa-regular fa-bookmark"></i> Guardar</button>
    </div>
  </div>

  <!-- Saved -->
  <div id="saved-section" style="margin-top:24px;">
    <h3 style="font-size:13px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Guardadas</h3>
    <div id="saved-list"></div>
  </div>
</main>

<!-- Bottom -->
<div class="bottom-bar">
  <div class="bottom-input">
    <input id="bottom-q" placeholder="Escreve o tema..." onkeydown="if(event.key==='Enter'){document.getElementById('topic').value=this.value;create();}"/>
    <button onclick="document.getElementById('topic').value=document.getElementById('bottom-q').value;create();">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
  </div>
</div>

<script>
const GEMINI_KEY = 'AQ.Ab8RN6L182WFoWlJFladCDe-xtd4FY7tA2289c4S64Pk9DaDEQ';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

let selectedType = 'motivacional';
let currentResult = '';
let saved = JSON.parse(localStorage.getItem('velora_legends') || '[]');

const prompts = {
  motivacional: topic => `Cria 3 frases motivacionais poderosas e virais sobre "${topic}". Cada frase máx 2 linhas. Tom impactante, directo. Em português.`,
  poesia: topic => `Cria um poema curto (4-6 versos) sobre "${topic}". Estilo Instagram/TikTok. Elegante e emotivo. Em português.`,
  instagram: topic => `Cria 3 legendas perfeitas para Instagram sobre "${topic}". Inclui emojis e hashtags relevantes. Tom inspirador. Em português.`,
  tiktok: topic => `Cria 3 hooks virais para TikTok sobre "${topic}". Primeiras frases que param o scroll. Directas e impactantes. Em português.`,
  profissional: topic => `Cria 3 textos profissionais para LinkedIn sobre "${topic}". Tom formal mas envolvente. Em português.`,
  humor: topic => `Cria 3 legendas humorísticas sobre "${topic}" para Instagram/TikTok. Criativas e engraçadas. Em português.`
};

function pickType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = el.dataset.type;
}

async function create() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('Escreve o tema!'); return; }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('btn-create').disabled = true;

  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: prompts[selectedType](topic) }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 800 }
      })
    });
    if (!res.ok) throw new Error('Erro ' + res.status);
    const data = await res.json();
    currentResult = data.candidates[0].content.parts[0].text;

    document.getElementById('result-text').textContent = currentResult;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('btn-create').disabled = false;
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-create').disabled = false;
    alert('Erro: ' + e.message);
  }
}

function copyResult() {
  navigator.clipboard.writeText(currentResult).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado!';
    btn.style.borderColor = '#ff00aa';
    btn.style.color = '#ff00aa';
    setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copiar Tudo'; btn.style.borderColor=''; btn.style.color=''; }, 2000);
  });
}

function saveResult() {
  const topic = document.getElementById('topic').value.trim();
  saved.unshift({ text: currentResult, topic, type: selectedType, date: new Date().toISOString() });
  if (saved.length > 20) saved.pop();
  localStorage.setItem('velora_legends', JSON.stringify(saved));
  renderSaved();
  alert('✅ Guardado!');
}

function renderSaved() {
  const list = document.getElementById('saved-list');
  if (!saved.length) { list.innerHTML = '<p style="color:#333;font-size:13px;">Sem legendas guardadas</p>'; return; }
  list.innerHTML = saved.slice(0,5).map((s, i) => `
    <div class="saved-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:11px;color:#d414bd;font-weight:600;text-transform:uppercase;">${s.type} · ${s.topic.slice(0,20)}</span>
        <button onclick="saved.splice(${i},1);localStorage.setItem('velora_legends',JSON.stringify(saved));renderSaved();" style="background:none;border:none;color:#333;cursor:pointer;font-size:14px;">✕</button>
      </div>
      <p style="font-size:13px;color:#aaa;line-height:1.5;">${s.text.slice(0,120)}${s.text.length>120?'...':''}</p>
      <button onclick="navigator.clipboard.writeText(this.dataset.t);this.textContent='✅ Copiado!';setTimeout(()=>this.textContent='📋 Copiar',2000)" data-t="${s.text.replace(/"/g,'&quot;')}" style="margin-top:8px;background:transparent;border:1px solid #1a001a;border-radius:8px;padding:5px 12px;color:#555;font-size:12px;cursor:pointer;">📋 Copiar</button>
    </div>`).join('');
}

renderSaved();
</script>
</body>
</html>
